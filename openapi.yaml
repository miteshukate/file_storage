openapi: 3.0.3
info:
  title: Enterprise Document Management System API
  description: |
    A production-ready, multi-tenant SaaS Document Management System API with role-based
    access control, document workflows, file versioning, sharing, audit logs, and analytics.

    ## Authentication
    All endpoints (except login, register-invite) require a valid JWT Bearer token.

    ## Multi-Tenancy
    Every request is scoped to a tenant via the `X-Tenant-ID` header or resolved from the JWT claims.

    ## Pagination
    List endpoints support `page` (0-indexed), `size`, and `sort` query parameters.

    ## Error Responses
    All error responses follow the `ErrorResponse` schema with `code`, `message`, and optional `details`.
  version: 1.0.0
  contact:
    name: DMS API Support
    email: api-support@dms.example.com
  license:
    name: Proprietary

servers:
  - url: https://api.dms.example.com/v1
    description: Production
  - url: https://staging-api.dms.example.com/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local Development

tags:
  - name: Auth
    description: Authentication and authorization
  - name: Users
    description: User management
  - name: Teams
    description: Team and group management
  - name: Files
    description: File operations
  - name: Folders
    description: Folder operations
  - name: Explorer
    description: File explorer and search
  - name: Sharing
    description: Sharing and permissions
  - name: Workflows
    description: Document workflows and approvals
  - name: Audit
    description: Audit and activity logs
  - name: Analytics
    description: Dashboard and analytics
  - name: Notifications
    description: User notifications
  - name: Admin
    description: Admin and tenant settings

security:
  - BearerAuth: []

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ── AUTH ──────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate with email and password, receive JWT access and refresh tokens.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: alice@acme.com
              password: "S3cur3P@ss!"
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalidate the current refresh token.
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user (admin only)
      description: Create a new user account within the tenant. Requires admin role.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me/password:
    put:
      tags: [Auth]
      summary: Change own password
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── USERS ─────────────────────────────────

  /users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: search
          in: query
          schema:
            type: string
          description: Filter by name or email
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, manager, editor, viewer]
        - name: teamId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, pending]
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: Get user by ID
      operationId: getUserById
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      responses:
        '204':
          description: User deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/roles:
    parameters:
      - $ref: '#/components/parameters/UserId'
    put:
      tags: [Users]
      summary: Assign roles to user
      operationId: assignRoles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolesRequest'
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/profile:
    parameters:
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [Users]
      summary: Update user profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── TEAMS ─────────────────────────────────

  /teams:
    get:
      tags: [Teams]
      summary: List teams
      operationId: listTeams
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamPageResponse'
    post:
      tags: [Teams]
      summary: Create team
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /teams/{teamId}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Teams]
      summary: Get team
      operationId: getTeam
      responses:
        '200':
          description: Team details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Teams]
      summary: Update team
      operationId: updateTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
    delete:
      tags: [Teams]
      summary: Delete team
      operationId: deleteTeam
      responses:
        '204':
          description: Team deleted

  /teams/{teamId}/members:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Teams]
      summary: List team members
      operationId: listTeamMembers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Team members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
    post:
      tags: [Teams]
      summary: Add members to team
      operationId: addTeamMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMembersRequest'
      responses:
        '204':
          description: Members added
    delete:
      tags: [Teams]
      summary: Remove members from team
      operationId: removeTeamMembers
      parameters:
        - name: userIds
          in: query
          required: true
          description: Comma-separated list of user UUIDs to remove
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: false
      responses:
        '204':
          description: Members removed

  # ── FOLDERS ───────────────────────────────

  /folders:
    post:
      tags: [Folders]
      summary: Create folder
      operationId: createFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderRequest'
      responses:
        '201':
          description: Folder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /folders/{folderId}:
    parameters:
      - $ref: '#/components/parameters/FolderId'
    get:
      tags: [Folders]
      summary: Get folder metadata
      operationId: getFolder
      responses:
        '200':
          description: Folder metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Folders]
      summary: Rename folder
      operationId: renameFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameRequest'
      responses:
        '200':
          description: Folder renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderResponse'
    delete:
      tags: [Folders]
      summary: Delete folder (moves to trash)
      operationId: deleteFolder
      parameters:
        - name: permanent
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Folder deleted

  /folders/{folderId}/move:
    parameters:
      - $ref: '#/components/parameters/FolderId'
    post:
      tags: [Folders]
      summary: Move folder
      operationId: moveFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveRequest'
      responses:
        '200':
          description: Folder moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderResponse'

  /folders/{folderId}/copy:
    parameters:
      - $ref: '#/components/parameters/FolderId'
    post:
      tags: [Folders]
      summary: Copy folder
      operationId: copyFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyRequest'
      responses:
        '201':
          description: Folder copied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderResponse'

  /folders/{folderId}/restore:
    parameters:
      - $ref: '#/components/parameters/FolderId'
    post:
      tags: [Folders]
      summary: Restore folder from trash
      operationId: restoreFolder
      responses:
        '200':
          description: Folder restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderResponse'

  /folders/{folderId}/files:
    parameters:
      - $ref: '#/components/parameters/FolderId'
    get:
      tags: [Folders]
      summary: Get all files in folder
      operationId: getFilesByFolder
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: Zero-indexed page number
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Number of items per page
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt,desc
          description: Sort criteria (e.g., createdAt,desc)
        - name: status
          in: query
          schema:
            type: string
            enum: [active, trashed, archived]
          description: Filter by file status
        - name: mimeType
          in: query
          schema:
            type: string
          description: Filter by MIME type
        - name: search
          in: query
          schema:
            type: string
          description: Search in file name and tags
      responses:
        '200':
          description: List of files in folder
          content:
            application/json:
              schema:
                type: object
                required: [content, totalElements, totalPages, currentPage, pageSize]
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/FileResponse'
                  totalElements:
                    type: integer
                  totalPages:
                    type: integer
                  currentPage:
                    type: integer
                  pageSize:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'

  # ── FILES ─────────────────────────────────

  /files:
    get:
      tags: [Files]
      summary: Get all files
      operationId: getAllFiles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: Zero-indexed page number
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Number of items per page
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt,desc
          description: Sort criteria (e.g., createdAt,desc)
        - name: status
          in: query
          schema:
            type: string
            enum: [active, trashed, archived]
          description: Filter by file status
        - name: mimeType
          in: query
          schema:
            type: string
          description: Filter by MIME type
        - name: search
          in: query
          schema:
            type: string
          description: Search in file name and tags
      responses:
        '200':
          description: List of all files
          content:
            application/json:
              schema:
                type: object
                required: [content, totalElements, totalPages, currentPage, pageSize]
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/FileResponse'
                  totalElements:
                    type: integer
                  totalPages:
                    type: integer
                  currentPage:
                    type: integer
                  pageSize:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Files]
      summary: Upload single file
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FileUploadRequest'
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'

  /files/bulk:
    post:
      tags: [Files]
      summary: Bulk upload files
      operationId: bulkUploadFiles
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkFileUploadRequest'
      responses:
        '207':
          description: Multi-status bulk upload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkUploadResponse'

  /files/{fileId}:
    parameters:
      - $ref: '#/components/parameters/FileId'
    get:
      tags: [Files]
      summary: Get file metadata
      operationId: getFile
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Files]
      summary: Rename file
      operationId: renameFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameRequest'
      responses:
        '200':
          description: File renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
    delete:
      tags: [Files]
      summary: Delete file (moves to trash)
      operationId: deleteFile
      parameters:
        - name: permanent
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: File deleted

  /files/{fileId}/download:
    parameters:
      - $ref: '#/components/parameters/FileId'
    get:
      tags: [Files]
      summary: Download file
      operationId: downloadFile
      parameters:
        - name: version
          in: query
          description: Specific version number; defaults to latest
          schema:
            type: integer
      responses:
        '200':
          description: File binary content
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="report.pdf"
            Content-Type:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /files/bulk-download:
    post:
      tags: [Files]
      summary: Bulk download files as ZIP
      operationId: bulkDownload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDownloadRequest'
      responses:
        '200':
          description: ZIP archive of selected files
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /files/{fileId}/move:
    parameters:
      - $ref: '#/components/parameters/FileId'
    post:
      tags: [Files]
      summary: Move file
      operationId: moveFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveRequest'
      responses:
        '200':
          description: File moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

  /files/{fileId}/copy:
    parameters:
      - $ref: '#/components/parameters/FileId'
    post:
      tags: [Files]
      summary: Copy file
      operationId: copyFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyRequest'
      responses:
        '201':
          description: File copied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

  /files/{fileId}/restore:
    parameters:
      - $ref: '#/components/parameters/FileId'
    post:
      tags: [Files]
      summary: Restore file from trash
      operationId: restoreFile
      responses:
        '200':
          description: File restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

  /files/{fileId}/preview:
    parameters:
      - $ref: '#/components/parameters/FileId'
    get:
      tags: [Files]
      summary: Get file preview
      description: Returns a preview image or HTML rendition of the file.
      operationId: previewFile
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [png, jpg, pdf, html]
            default: png
        - name: page
          in: query
          description: Page number for multi-page documents
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Preview content
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            text/html:
              schema:
                type: string

  /files/{fileId}/versions:
    parameters:
      - $ref: '#/components/parameters/FileId'
    get:
      tags: [Files]
      summary: List file versions
      operationId: listFileVersions
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: List of file versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileVersionPageResponse'
    post:
      tags: [Files]
      summary: Upload new file version
      operationId: uploadFileVersion
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FileVersionUploadRequest'
      responses:
        '201':
          description: New version uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileVersionResponse'

  /files/{fileId}/versions/{versionId}/restore:
    parameters:
      - $ref: '#/components/parameters/FileId'
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Files]
      summary: Restore a specific file version
      operationId: restoreFileVersion
      responses:
        '200':
          description: Version restored as latest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

  /files/{fileId}/tags:
    parameters:
      - $ref: '#/components/parameters/FileId'
    put:
      tags: [Files]
      summary: Set tags on file
      operationId: setFileTags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagsRequest'
      responses:
        '200':
          description: Tags updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

  # ── EXPLORER ──────────────────────────────

  /explorer:
    get:
      tags: [Explorer]
      summary: List directory contents
      operationId: listDirectory
      parameters:
        - name: folderId
          in: query
          description: Folder to list; omit for root
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'

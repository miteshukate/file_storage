# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────
components:

  # ── Security ──────────────────────────────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained via /auth/login

  # ── Parameters ────────────────────────────
  parameters:
    Page:
      name: page
      in: query
      description: Zero-based page index
      schema:
        type: integer
        default: 0
        minimum: 0

    Size:
      name: size
      in: query
      description: Number of items per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 200

    Sort:
      name: sort
      in: query
      description: "Sort expression: field,asc or field,desc"
      schema:
        type: string
        example: createdAt,desc

    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    TeamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    FolderId:
      name: folderId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ── Responses ─────────────────────────────
  responses:
    BadRequest:
      description: Bad request – validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "VALIDATION_ERROR"
            message: "Request validation failed"
            details:
              - field: "email"
                issue: "must be a valid email address"

    Unauthorized:
      description: Unauthorized – missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "UNAUTHORIZED"
            message: "Authentication required"

    Forbidden:
      description: Forbidden – insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "FORBIDDEN"
            message: "You do not have permission to perform this action"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "NOT_FOUND"
            message: "The requested resource was not found"

    Conflict:
      description: Conflict – resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "CONFLICT"
            message: "A resource with this identifier already exists"

    PayloadTooLarge:
      description: File exceeds maximum allowed size
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "FILE_TOO_LARGE"
            message: "File exceeds the maximum allowed size of 5 GB"

  # ── Schemas ───────────────────────────────
  schemas:

    # ── Primitives & Wrappers ──────────────

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error message
          example: Request validation failed
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        traceId:
          type: string
          description: Distributed trace identifier
          example: 4bf92f3577b34da6a3ce929d0e0e4736

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        issue:
          type: string

    PageMeta:
      type: object
      required: [page, size, totalElements, totalPages]
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 142
        totalPages:
          type: integer
          example: 8

    # ── Auth ──────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@acme.com
        password:
          type: string
          format: password
          minLength: 8
          example: "S3cur3P@ss!"
        tenantId:
          type: string
          format: uuid
          description: Required for multi-tenant disambiguation if email is in multiple tenants

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn, tokenType]
      properties:
        accessToken:
          type: string
          description: JWT access token (short-lived)
        refreshToken:
          type: string
          description: Opaque refresh token (long-lived)
        expiresIn:
          type: integer
          description: Access token lifetime in seconds
          example: 900
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserSummary'

    RegisterUserRequest:
      type: object
      required: [email, firstName, lastName, role]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        role:
          type: string
          enum: [admin, manager, editor, viewer]
        teamIds:
          type: array
          items:
            type: string
            format: uuid
        sendInviteEmail:
          type: boolean
          default: true

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 8

    # ── Users ─────────────────────────────

    UserSummary:
      type: object
      required: [id, email, firstName, lastName]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          properties:
            roles:
              type: array
              items:
                type: string
                enum: [admin, manager, editor, viewer]
            status:
              type: string
              enum: [active, inactive, pending]
            tenantId:
              type: string
              format: uuid
            teams:
              type: array
              items:
                $ref: '#/components/schemas/TeamSummary'
            lastLoginAt:
              type: string
              format: date-time
              nullable: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    UserPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    UpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        status:
          type: string
          enum: [active, inactive]

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        avatar:
          type: string
          format: binary
          description: Profile picture file

    AssignRolesRequest:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          minItems: 1
          items:
            type: string
            enum: [admin, manager, editor, viewer]

    # ── Teams ─────────────────────────────

    TeamSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    TeamResponse:
      allOf:
        - $ref: '#/components/schemas/TeamSummary'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            memberCount:
              type: integer
            createdBy:
              $ref: '#/components/schemas/UserSummary'
            tenantId:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    TeamPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TeamResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 150
        description:
          type: string
          maxLength: 1000

    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 150
        description:
          type: string

    TeamMembersRequest:
      type: object
      required: [userIds]
      properties:
        userIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid

    # ── Files ─────────────────────────────

    FileResponse:
      type: object
      required: [id, name, mimeType, size, folderId, ownerId, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Q4-Report.pdf
        mimeType:
          type: string
          example: application/pdf
        extension:
          type: string
          example: pdf
        size:
          type: integer
          format: int64
          description: File size in bytes
          example: 2097152
        folderId:
          type: string
          format: uuid
          nullable: true
        path:
          type: string
          description: Full logical path
          example: /Finance/2024/Q4-Report.pdf
        ownerId:
          type: string
          format: uuid
        owner:
          $ref: '#/components/schemas/UserSummary'
        status:
          type: string
          enum: [active, trashed, archived]
        currentVersion:
          type: integer
          example: 3
        tags:
          type: array
          items:
            type: string
          example: [finance, quarterly, approved]
        checksum:
          type: string
          description: MD5 or SHA-256 checksum
          example: "d41d8cd98f00b204e9800998ecf8427e"
        previewAvailable:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true

    FileUploadRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: File content
        folderId:
          type: string
          format: uuid
          description: Target folder; root if omitted
        tags:
          type: string
          description: Comma-separated tags
          example: finance,2024
        description:
          type: string
          maxLength: 2000

    BulkFileUploadRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: string
            format: binary
          description: Multiple file binaries
        folderId:
          type: string
          format: uuid

    BulkUploadResponse:
      type: object
      properties:
        succeeded:
          type: array
          items:
            $ref: '#/components/schemas/FileResponse'
        failed:
          type: array
          items:
            type: object
            properties:
              fileName:
                type: string
              error:
                $ref: '#/components/schemas/ErrorResponse'

    BulkDownloadRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [id, type]
            properties:
              id:
                type: string
                format: uuid
              type:
                type: string
                enum: [file, folder]
        archiveName:
          type: string
          example: export-2024.zip

    FileVersionResponse:
      type: object
      required: [id, fileId, version, size, createdBy, createdAt]
      properties:
        id:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
        version:
          type: integer
        size:
          type: integer
          format: int64
        checksum:
          type: string
        comment:
          type: string
        createdBy:
          $ref: '#/components/schemas/UserSummary'
        createdAt:
          type: string
          format: date-time

    FileVersionPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FileVersionResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    FileVersionUploadRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
        comment:
          type: string
          maxLength: 500

    TagsRequest:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            type: string
          example: [finance, approved]

    RenameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255

    MoveRequest:
      type: object
      required: [targetFolderId]
      properties:
        targetFolderId:
          type: string
          format: uuid
          nullable: true
          description: Destination folder ID; null for root

    CopyRequest:
      type: object
      required: [targetFolderId]
      properties:
        targetFolderId:
          type: string
          format: uuid
          nullable: true
        newName:
          type: string
          description: Optional rename on copy

    # ── Folders ───────────────────────────

    FolderResponse:
      type: object
      required: [id, name, ownerId, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        path:
          type: string
          example: /Finance/2024
        ownerId:
          type: string
          format: uuid
        owner:
          $ref: '#/components/schemas/UserSummary'
        status:
          type: string
          enum: [active, trashed]
        fileCount:
          type: integer
        folderCount:
          type: integer
        totalSize:
          type: integer
          format: int64
          description: Total size of contents in bytes
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateFolderRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        parentId:
          type: string
          format: uuid
          nullable: true
          description: Parent folder; null for root
        tags:
          type: array
          items:
            type: string

    # ── Explorer ──────────────────────────

    DirectoryItem:
      type: object
      required: [id, type, name, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [file, folder]
        name:
          type: string
        mimeType:
          type: string
          nullable: true
        size:
          type: integer
          format: int64
          nullable: true
        owner:
          $ref: '#/components/schemas/UserSummary'
        tags:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time

    DirectoryResponse:
      type: object
      properties:
        folder:
          allOf:
            - $ref: '#/components/schemas/FolderResponse'
          nullable: true
          description: Current folder metadata; null if listing root
        items:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryItem'
        meta:
          $ref: '#/components/schemas/PageMeta'

    BreadcrumbItem:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        isRoot:
          type: boolean

    BreadcrumbResponse:
      type: object
      required: [path]
      properties:
        path:
          type: array
          items:
            $ref: '#/components/schemas/BreadcrumbItem'
          example:
            - id: "00000000-0000-0000-0000-000000000000"
              name: "Root"
              isRoot: true
            - id: "aabb1234-0000-0000-0000-000000000000"
              name: "Finance"
              isRoot: false
            - id: "ccdd5678-0000-0000-0000-000000000000"
              name: "2024"
              isRoot: false

    SearchResult:
      type: object
      required: [id, type, name, path, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [file, folder]
        name:
          type: string
        path:
          type: string
        mimeType:
          type: string
          nullable: true
        owner:
          $ref: '#/components/schemas/UserSummary'
        tags:
          type: array
          items:
            type: string
        highlight:
          type: string
          description: Snippet of matched content with highlights
          nullable: true
        updatedAt:
          type: string
          format: date-time

    SearchResultPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        meta:
          $ref: '#/components/schemas/PageMeta'

    # ── Sharing ───────────────────────────

    CreateShareRequest:
      type: object
      required: [resourceType, resourceId, principals]
      properties:
        resourceType:
          type: string
          enum: [file, folder]
        resourceId:
          type: string
          format: uuid
        principals:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SharePrincipal'
        notifyRecipients:
          type: boolean
          default: true
        message:
          type: string
          maxLength: 1000

    SharePrincipal:
      type: object
      required: [principalType, principalId, permission]
      properties:
        principalType:
          type: string
          enum: [user, team]
        principalId:
          type: string
          format: uuid
        permission:
          type: string
          enum: [read, write, admin]

    ShareResponse:
      type: object
      properties:
        resourceType:
          type: string
          enum: [file, folder]
        resourceId:
          type: string
          format: uuid
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AclEntryResponse'

    AclEntryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        principalType:
          type: string
          enum: [user, team]
        principalId:
          type: string
          format: uuid
        principalName:
          type: string
        permission:
          type: string
          enum: [read, write, admin]
        grantedBy:
          $ref: '#/components/schemas/UserSummary'
        grantedAt:
          type: string
          format: date-time

    AclResponse:
      type: object
      properties:
        resourceType:
          type: string
          enum: [file, folder]
        resourceId:
          type: string
          format: uuid
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AclEntryResponse'

    UpdatePermissionRequest:
      type: object
      required: [permission]
      properties:
        permission:
          type: string
          enum: [read, write, admin]

    PublicLinkRequest:
      type: object
      required: [resourceType, resourceId]
      properties:
        resourceType:
          type: string
          enum: [file, folder]
        resourceId:
          type: string
          format: uuid
        permission:
          type: string
          enum: [read, write]
          default: read
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Expiry time; null for no expiry
        password:
          type: string
          description: Optional link password
        maxDownloads:
          type: integer
          description: Maximum number of uses; null for unlimited
          nullable: true

    PublicLinkResponse:
      type: object
      properties:
        token:
          type: string
        url:
          type: string
          format: uri
          example: https://app.dms.example.com/share/AbCdEfGh
        permission:
          type: string
          enum: [read, write]
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Workflows ─────────────────────────

    WorkflowStep:
      type: object
      required: [order, name, approverType, approverId]
      properties:
        order:
          type: integer
          minimum: 1
        name:
          type: string
          maxLength: 150
        approverType:
          type: string
          enum: [user, team, role]
        approverId:
          type: string
          format: uuid
        requireAllMembers:
          type: boolean
          default: false
          description: For team approvers; require unanimous approval
        deadlineHours:
          type: integer
          nullable: true

    CreateWorkflowTemplateRequest:
      type: object
      required: [name, steps]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        steps:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/WorkflowStep'
        isDefault:
          type: boolean
          default: false

    WorkflowTemplateResponse:
      allOf:
        - $ref: '#/components/schemas/CreateWorkflowTemplateRequest'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            tenantId:
              type: string
              format: uuid
            createdBy:
              $ref: '#/components/schemas/UserSummary'
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    WorkflowTemplatePageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTemplateResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    CreateWorkflowRequest:
      type: object
      required: [fileId, templateId]
      properties:
        fileId:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 255
        dueDate:
          type: string
          format: date-time
          nullable: true

    WorkflowSubmitRequest:
      type: object
      properties:
        comment:
          type: string
          maxLength: 2000

    WorkflowDecisionRequest:
      type: object
      properties:
        comment:
          type: string
          maxLength: 2000

    WorkflowStepInstance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [pending, in_progress, approved, rejected, skipped]
        approver:
          $ref: '#/components/schemas/UserSummary'
        decidedAt:
          type: string
          format: date-time
          nullable: true
        comment:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true

    WorkflowInstanceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [pending, in_progress, approved, rejected, cancelled]
        file:
          $ref: '#/components/schemas/FileResponse'
        template:
          $ref: '#/components/schemas/WorkflowTemplateResponse'
        initiatedBy:
          $ref: '#/components/schemas/UserSummary'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStepInstance'
        currentStep:
          type: integer
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkflowInstancePageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowInstanceResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    WorkflowHistoryEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [created, submitted, approved, rejected, cancelled, step_assigned, reminded]
        actor:
          $ref: '#/components/schemas/UserSummary'
        stepName:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time

    WorkflowHistoryPageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowHistoryEvent'
        meta:
          $ref: '#/components/schemas/PageMeta'

    # ── Audit ─────────────────────────────

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          example: file.download
        actor:
          $ref: '#/components/schemas/UserSummary'
        resourceType:
          type: string
          enum: [file, folder, user, team, workflow, share, auth, system]
        resourceId:
          type: string
          format: uuid
          nullable: true
        resourceName:
          type: string
          nullable: true
        ipAddress:
          type: string
          example: 203.0.113.42
        userAgent:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          description: Additional context specific to the action
        occurredAt:
          type: string
          format: date-time

    AuditLogPageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEntry'
